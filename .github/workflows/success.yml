# Triggered from the Actions tab.
# It is designed to verify the success path where no alerts/tickets are generated.

name: Success

on:
  workflow_dispatch:
    inputs:
      job_name:
        description: "Operational job name to simulate"
        required: true
        default: "set-default-attribute"

permissions:
  contents: read

jobs:
  run-successful-job:
    name: Run successful simulated job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show selected inputs
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ inputs.job_name }}"

      - name: Run simulated successful job
        env:
          SIM_MODE: success
          SIM_JOB_NAME: ${{ inputs.job_name }}
        run: |
          # Now pointing to main.py as requested
          python main.py

      - name: Show generated result
        run: |
          # Checking the output file generated by main.py
          if [ -f job_result.json ]; then
            cat job_result.json
          else
            echo "job_result.json not found."
          fi

      - name: Confirm no ticket should be raised
        run: |
          echo "This was a successful run."
          echo "No failure payload was sent to DEV or PROD environments."