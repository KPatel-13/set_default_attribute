name: Simulator Success

on:
  workflow_dispatch:
    inputs:
      job_name:
        description: "Operational job name to simulate"
        required: true
        default: "daily-data-sync"

permissions:
  contents: read

jobs:
  run-successful-job:
    name: Run successful simulated job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show selected inputs
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ inputs.job_name }}"

      - name: Run simulated job successfully
        env:
          SIM_MODE: success
        run: |
          python scripts/main.py

      - name: Show generated result
        run: |
          cat job_result.json

      - name: No notification required
        run: |
          echo "Simulated job succeeded. No failure payload will be sent."