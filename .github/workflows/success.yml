name: Set Default Attribute - Success

on:
  workflow_dispatch:
    inputs:
      job_name:
        description: "Operational job name to simulate"
        required: true
        default: "set-default-attribute-dev"
      dataset:
        description: "Logical dataset being processed"
        required: true
        default: "customer-preferences"

permissions:
  contents: read

run-name: >-
  Success | job=${{ inputs.job_name }} | dataset=${{ inputs.dataset }}

jobs:
  run-successful-job:
    name: Run successful set_default_attribute job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show selected inputs
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ inputs.job_name }}"
          echo "Dataset: ${{ inputs.dataset }}"

      - name: Generate successful result
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          payload = {
              "result": "success",
              "summary": "Default attribute assignment completed successfully",
              "details": "All selected items were processed and default attributes were applied without errors.",
              "severity": "low",
              "dataset": "${{ inputs.dataset }}",
              "generatedAt": datetime.now(timezone.utc).isoformat(),
          }

          Path("job_result.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
          PY

      - name: Show generated result
        run: |
          cat job_result.json

      - name: No notification required
        run: |
          echo "Simulated job succeeded. No failure payload will be sent."