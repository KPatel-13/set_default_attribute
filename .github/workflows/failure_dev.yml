name: Dev Failure

on:
  workflow_dispatch:
    inputs:
      job_name:
        description: "Operational job name"
        required: true
        default: "daily-data-sync-dev"
      failure_mode:
        description: "Failure mode"
        required: true
        default: "fixed"
        type: choice
        options: [fixed, random]
      error_code:
        description: "Error code"
        required: true
        default: "OBJECT_NOT_FOUND"
        type: choice
        options: [OBJECT_NOT_FOUND, OUTPUT_WRITE_FAILED, INVALID_INPUT, DOWNSTREAM_UNAVAILABLE, PROCESSING_TIMEOUT]

permissions:
  contents: read

jobs:
  run-failing-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run main script
        id: job_sim
        env:
          SIM_ERROR_CODE: ${{ inputs.error_code }}
          SIM_MODE: ${{ inputs.failure_mode == 'random' && 'random' || 'failure' }}
        run: |
          set +e
          python main.py
          exit_code=$?
          set -e
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Build request payload
        if: steps.job_sim.outputs.exit_code != '0'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path("job_result.json").read_text(encoding="utf-8"))
          payload = {
              "repo": "${{ github.repository }}",
              "workflowName": "${{ github.workflow }}",
              "runId": "${{ github.run_id }}",
              "runUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "failures": [{
                  "jobName": "${{ inputs.job_name }}",
                  "summary": result["summary"],
                  "details": result["details"],
                  "severity": result["severity"],
              }],
          }
          Path("payload.json").write_text(json.dumps(payload), encoding="utf-8")
          PY

      - name: Notify Dev Service
        if: steps.job_sim.outputs.exit_code != '0'
        env:
          URL: ${{ secrets.DEV_WORKFLOW_FAILURE_ENDPOINT }}
          SECRET: ${{ secrets.DEV_WORKFLOW_FAILURE_SECRET }}
        run: |
          status_code=$(curl --show-error --silent --output /dev/null --write-out "%{http_code}" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "X-Workflow-Secret: $SECRET" \
            --data @payload.json)

          echo "Dev Status: $status_code"
          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            exit 1
          fi

      - name: Finalize Failure
        if: steps.job_sim.outputs.exit_code != '0'
        run: exit 1